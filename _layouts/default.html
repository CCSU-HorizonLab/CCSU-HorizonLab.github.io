<!doctype html>
<html lang="{{ site.lang | default: 'zh-CN' }}">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="{{ site.description }}">
    <meta name="theme-color" content="#ffffff">

    <meta property="og:title" content="{{ site.title }}">
    <meta property="og:description" content="{{ site.description }}">
    <meta property="og:type" content="website">
    <meta property="og:url" content="{{ site.url }}">
    <meta property="og:image" content="https://github.com/{{ site.github_org }}.png">

    <title>{{ page.title | default: site.title }}</title>
    <link rel="icon" type="image/png" href="{{ '/assets/img/CCSU.png' | relative_url }}">
    <link rel="apple-touch-icon" href="{{ '/assets/img/CCSU.png' | relative_url }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ '/assets/css/custom.css' | relative_url }}">
  </head>
  <body>
    <a class="skip-link" href="#main">跳到主要内容</a>

    <header class="site-header">
      <div class="header-inner">
        <a href="{{ '/' | relative_url }}" class="brand">
          <img src="{{ '/assets/img/CCSU.png' | relative_url }}" alt="CCSU Logo" class="ccsu-logo">
          <span>Horizon</span>
        </a>
        <nav class="site-nav">
          <a href="#about">关于我们</a>
          <a href="#members">实验室成员</a>
          <a href="#projects">开源项目</a>
          <a href="#join">加入我们</a>
        </nav>
      </div>
    </header>

    <main id="main">
      {{ content }}
    </main>

    <footer class="site-footer">
      <div class="footer-content">
        <div class="footer-brand">
          <svg aria-hidden="true" viewBox="0 0 16 16" width="32" height="32" fill="currentColor">
            <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27s1.36.09 2 .27c1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.01 8.01 0 0 0 16 8c0-4.42-3.58-8-8-8z"></path>
          </svg>
          <div class="footer-brand-text">
            <h3>{{ site.github_org }}</h3>
            <p>{{ site.lab.college }}“文化+科技”创新实验室</p>
          </div>
        </div>
        
        <div class="footer-links">
          <a href="{{ site.github_url }}" target="_blank" rel="noopener">GitHub 主页 ↗</a>
          <span class="dot">·</span>
          <a href="#">关注我们</a>
          <span class="dot">·</span>
          <a href="#">发起讨论</a>
        </div>
        
        <div class="footer-copyright">
          <p>© <span data-year>2026</span> {{ site.github_org }}. All rights reserved.</p>
        </div>
      </div>
    </footer>

    <script src="{{ '/assets/js/main.js' | relative_url }}" defer></script>
  </body>
</html>
